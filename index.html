<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus | Radiant</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.15);
            --glass-border: rgba(255, 255, 255, 0.3);
            --glass-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
            --text-main: #ffffff;
            --text-dark: #2d1b4e;
            --accent: #00f2ff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
            -webkit-font-smoothing: antialiased;
            user-select: none;
            outline: none;
        }

        body {
            height: 100vh;
            overflow: hidden;
            background: linear-gradient(45deg, #662D8C, #ED1E79);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        #canvas-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: 0;
            animation: floatOrb 20s infinite ease-in-out;
            opacity: 0.6;
        }

        .orb-1 { width: 50vh; height: 50vh; background: #4facfe; top: -10%; left: -10%; animation-delay: 0s; }
        .orb-2 { width: 60vh; height: 60vh; background: #f093fb; bottom: -10%; right: -10%; animation-delay: -5s; }
        .orb-3 { width: 40vh; height: 40vh; background: #43e97b; top: 40%; left: 40%; animation-delay: -10s; }

        @keyframes floatOrb {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(30px, 50px); }
        }

        .main-ui {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 1200px;
            height: 92vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2rem;
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        body.focus .main-ui > *:not(.search-container) {
            opacity: 0.3;
            filter: blur(10px);
            transform: scale(0.95);
            pointer-events: none;
        }

        .clock-display {
            text-align: center;
            color: var(--text-main);
            text-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .time {
            font-size: 5rem;
            font-weight: 700;
            line-height: 1;
            letter-spacing: -2px;
        }

        .date {
            font-size: 1.1rem;
            font-weight: 300;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-top: 5px;
            opacity: 0.9;
        }

        .search-container {
            width: 100%;
            max-width: 720px;
            position: relative;
            z-index: 100;
        }

        .search-shell {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 25px;
            padding: 8px;
            display: flex;
            align-items: center;
            box-shadow: var(--glass-shadow);
            transition: all 0.3s ease;
        }

        .search-shell:focus-within {
            background: rgba(255, 255, 255, 0.35);
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
            transform: translateY(-2px);
        }

        .eng-switch {
            position: relative;
            margin-left: 5px;
        }

        .curr-eng {
            width: 44px; height: 44px;
            border-radius: 18px;
            background: rgba(255,255,255,0.2);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem;
            color: #fff;
            cursor: pointer;
            transition: 0.3s;
        }

        .curr-eng:hover { background: #fff; color: var(--text-dark); }

        .eng-dropdown {
            position: absolute;
            top: 130%; left: 0;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 16px;
            padding: 8px;
            width: 160px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            opacity: 0;
            pointer-events: none;
            transform: translateY(-10px);
            transition: 0.2s;
        }

        .eng-switch:hover .eng-dropdown {
            opacity: 1; pointer-events: all; transform: translateY(0);
        }

        .eng-item {
            padding: 10px;
            border-radius: 10px;
            display: flex; align-items: center; gap: 10px;
            color: #444;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .eng-item:hover { background: rgba(0,0,0,0.05); color: #000; }

        .search-input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 0 20px;
            font-size: 1.2rem;
            color: #fff;
            font-weight: 400;
        }

        .search-input::placeholder { color: rgba(255,255,255,0.7); }

        .btn-go {
            width: 44px; height: 44px;
            border-radius: 18px;
            background: #fff;
            border: none;
            color: var(--text-dark);
            cursor: pointer;
            transition: 0.3s;
            display: flex; align-items: center; justify-content: center;
        }

        .btn-go:hover { transform: scale(1.1); box-shadow: 0 0 20px rgba(255,255,255,0.5); }

        .grid-area {
            flex: 1;
            width: 100%;
            overflow-y: auto;
            padding: 10px;
            mask-image: linear-gradient(to bottom, transparent, black 2%, black 98%, transparent);
        }

        .grid-area::-webkit-scrollbar { display: none; }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
            gap: 20px;
            padding-bottom: 50px;
        }

        .card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            height: 110px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            backdrop-filter: blur(10px);
        }

        .card::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, rgba(255,255,255,0.4), transparent);
            opacity: 0;
            transition: 0.4s;
        }

        .card:hover {
            transform: translateY(-8px) scale(1.02);
            background: rgba(255,255,255,0.25);
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
            border-color: rgba(255,255,255,0.6);
        }

        .card:hover::after { opacity: 1; }

        .icon-wrap {
            font-size: 2rem;
            color: #fff;
            filter: drop-shadow(0 2px 5px rgba(0,0,0,0.2));
            transition: 0.3s;
        }

        .icon-img {
            width: 36px; height: 36px;
            border-radius: 10px;
            object-fit: cover;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .card:hover .icon-wrap { transform: scale(1.15) rotate(5deg); }
        .card:hover .icon-img { transform: scale(1.15) rotate(5deg); }

        .card-label {
            font-size: 0.85rem;
            color: rgba(255,255,255,0.9);
            font-weight: 600;
            width: 90%;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .settings-fab {
            position: fixed;
            bottom: 30px; right: 30px;
            width: 50px; height: 50px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(10px);
            display: flex; align-items: center; justify-content: center;
            color: #fff;
            cursor: pointer;
            transition: 0.3s;
            z-index: 200;
        }

        .settings-fab:hover {
            background: #fff;
            color: var(--text-dark);
            transform: rotate(90deg) scale(1.1);
        }

        .context-menu {
            position: absolute;
            background: rgba(255,255,255,0.95);
            border-radius: 12px;
            padding: 5px;
            min-width: 140px;
            display: none;
            flex-direction: column;
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
            z-index: 500;
            animation: popIn 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }

        .ctx-item {
            padding: 10px 15px;
            font-size: 0.9rem;
            color: #333;
            cursor: pointer;
            display: flex; gap: 10px; align-items: center;
            border-radius: 8px;
            transition: 0.2s;
        }

        .ctx-item:hover { background: #eee; }
        .ctx-item.del { color: #ff4757; }
        .ctx-item.del:hover { background: #ffe0e3; }

        .modal-wrap {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(15px);
            display: flex; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none;
            transition: 0.3s;
            z-index: 900;
        }

        .modal-wrap.active { opacity: 1; pointer-events: all; }

        .modal-box {
            background: #fff;
            width: 90%; max-width: 420px;
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            transform: translateY(20px) scale(0.95);
            transition: 0.4s cubic-bezier(0.19, 1, 0.22, 1);
        }

        .modal-wrap.active .modal-box { transform: translateY(0) scale(1); }

        .modal-title { font-size: 1.5rem; margin-bottom: 20px; color: #333; }

        .input-row { margin-bottom: 15px; }
        .input-lbl { font-size: 0.8rem; color: #666; margin-bottom: 6px; display: block; font-weight: 600; }
        .modal-inp {
            width: 100%;
            padding: 12px;
            border: 2px solid #eee;
            border-radius: 12px;
            font-size: 1rem;
            transition: 0.3s;
        }
        .modal-inp:focus { border-color: #a18cd1; }

        .modal-foot { display: flex; justify-content: flex-end; gap: 10px; margin-top: 25px; }
        .btn {
            padding: 10px 24px; border-radius: 12px; border: none; font-weight: 600; cursor: pointer; transition: 0.2s;
        }
        .btn-sub { background: #f0f0f0; color: #555; }
        .btn-sub:hover { background: #e0e0e0; }
        .btn-main { background: #2d1b4e; color: #fff; }
        .btn-main:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(45,27,78,0.3); }

    </style>
</head>
<body>
    
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <canvas id="canvas-overlay"></canvas>

    <div class="main-ui">
        <div class="clock-display">
            <div class="time" id="clock">00:00</div>
            <div class="date" id="date">Loading...</div>
        </div>

        <div class="search-container">
            <div class="search-shell">
                <div class="eng-switch">
                    <div class="curr-eng" id="currEngBtn"><i class="fab fa-google"></i></div>
                    <div class="eng-dropdown">
                        <div class="eng-item" onclick="app.setEngine('google', 'fab fa-google')"><i class="fab fa-google"></i> Google</div>
                        <div class="eng-item" onclick="app.setEngine('bing', 'fab fa-microsoft')"><i class="fab fa-microsoft"></i> Bing</div>
                        <div class="eng-item" onclick="app.setEngine('yahoo', 'fab fa-yahoo')"><i class="fab fa-yahoo"></i> Yahoo</div>
                    </div>
                </div>
                <input type="text" class="search-input" id="searchInp" placeholder="Explore the universe..." autocomplete="off">
                <button class="btn-go" id="searchBtn"><i class="fas fa-arrow-right"></i></button>
            </div>
        </div>

        <div class="grid-area">
            <div class="grid" id="grid"></div>
        </div>
    </div>

    <div class="settings-fab" id="setBtn"><i class="fas fa-cog"></i></div>

    <div class="context-menu" id="ctxMenu">
        <div class="ctx-item" id="ctxEdit"><i class="fas fa-pen"></i> Edit</div>
        <div class="ctx-item del" id="ctxDel"><i class="fas fa-trash"></i> Remove</div>
    </div>

    <!-- Edit Modal -->
    <div class="modal-wrap" id="editModal">
        <div class="modal-box">
            <h2 class="modal-title">Shortcut Details</h2>
            <div class="input-row">
                <label class="input-lbl">Name</label>
                <input type="text" class="modal-inp" id="eName">
            </div>
            <div class="input-row">
                <label class="input-lbl">URL</label>
                <input type="text" class="modal-inp" id="eUrl">
            </div>
            <div class="input-row">
                <label class="input-lbl">Icon (FontAwesome)</label>
                <input type="text" class="modal-inp" id="eIcon" placeholder="fab fa-github">
            </div>
            <div class="modal-foot">
                <button class="btn btn-sub" onclick="app.toggleModal('editModal', false)">Cancel</button>
                <button class="btn btn-main" onclick="app.saveShortcut()">Save</button>
            </div>
        </div>
    </div>

    <!-- Data Modal -->
    <div class="modal-wrap" id="dataModal">
        <div class="modal-box">
            <h2 class="modal-title">Settings</h2>
            <p style="color:#666; margin-bottom:20px;">Manage your local dashboard data.</p>
            <div class="modal-foot" style="justify-content: center;">
                <button class="btn btn-sub" onclick="app.exportData()"><i class="fas fa-download"></i> Backup</button>
                <button class="btn btn-sub" onclick="app.importData()"><i class="fas fa-upload"></i> Restore</button>
                <button class="btn btn-main" onclick="app.toggleModal('dataModal', false)">Done</button>
            </div>
        </div>
    </div>

    <script>
        const ENV = {
            utcOffset: 8,
            engines: {
                google: "https://www.google.com/search?q=",
                bing: "https://www.bing.com/search?q=",
                yahoo: "https://search.yahoo.com/search?p="
            }
        };

        const CORE_SITES = [
            { id: 1, name: 'Google', url: 'https://google.com', icon: 'fab fa-google' },
            { id: 2, name: 'YouTube', url: 'https://youtube.com', icon: 'fab fa-youtube' },
            { id: 3, name: 'X / Twitter', url: 'https://twitter.com', icon: 'fab fa-x-twitter' },
            { id: 4, name: 'Instagram', url: 'https://instagram.com', icon: 'fab fa-instagram' },
            { id: 5, name: 'Facebook', url: 'https://facebook.com', icon: 'fab fa-facebook' },
            { id: 6, name: 'LinkedIn', url: 'https://linkedin.com', icon: 'fab fa-linkedin' },
            { id: 7, name: 'Reddit', url: 'https://reddit.com', icon: 'fab fa-reddit' },
            { id: 8, name: 'ChatGPT', url: 'https://chat.openai.com', icon: 'fas fa-robot' },
            { id: 9, name: 'GitHub', url: 'https://github.com', icon: 'fab fa-github' },
            { id: 10, name: 'StackOverflow', url: 'https://stackoverflow.com', icon: 'fab fa-stack-overflow' },
            { id: 11, name: 'Amazon', url: 'https://amazon.com', icon: 'fab fa-amazon' },
            { id: 12, name: 'Netflix', url: 'https://netflix.com', icon: 'fas fa-film' },
            { id: 13, name: 'Wikipedia', url: 'https://wikipedia.org', icon: 'fab fa-wikipedia-w' },
            { id: 14, name: 'Gmail', url: 'https://mail.google.com', icon: 'fas fa-envelope' },
            { id: 15, name: 'Drive', url: 'https://drive.google.com', icon: 'fab fa-google-drive' },
            { id: 16, name: 'Twitch', url: 'https://twitch.tv', icon: 'fab fa-twitch' },
            { id: 17, name: 'Spotify', url: 'https://open.spotify.com', icon: 'fab fa-spotify' },
            { id: 18, name: 'WhatsApp', url: 'https://web.whatsapp.com', icon: 'fab fa-whatsapp' },
            { id: 19, name: 'Discord', url: 'https://discord.com', icon: 'fab fa-discord' },
            { id: 20, name: 'TikTok', url: 'https://tiktok.com', icon: 'fab fa-tiktok' },
            { id: 21, name: 'Pinterest', url: 'https://pinterest.com', icon: 'fab fa-pinterest' },
            { id: 22, name: 'AliExpress', url: 'https://aliexpress.com', icon: 'fas fa-shopping-bag' },
            { id: 23, name: 'eBay', url: 'https://ebay.com', icon: 'fab fa-ebay' },
            { id: 24, name: 'Apple', url: 'https://apple.com', icon: 'fab fa-apple' },
            { id: 25, name: 'Booking', url: 'https://booking.com', icon: 'fas fa-suitcase' },
            { id: 26, name: 'Airbnb', url: 'https://airbnb.com', icon: 'fab fa-airbnb' },
            { id: 27, name: 'Telegram', url: 'https://web.telegram.org', icon: 'fab fa-telegram' }, // Replaced TripAdvisor
            { id: 28, name: 'BBC', url: 'https://bbc.com', icon: 'fas fa-globe' },
            { id: 29, name: 'NY Times', url: 'https://nytimes.com', icon: 'fas fa-newspaper' },
            { id: 30, name: 'SoundCloud', url: 'https://soundcloud.com', icon: 'fab fa-soundcloud' }, // Replaced DuckDuckGo
            { id: 31, name: 'Bing', url: 'https://bing.com', icon: 'fab fa-microsoft' },
            { id: 32, name: 'Figma', url: 'https://figma.com', icon: 'fab fa-figma' },
            { id: 33, name: 'Dropbox', url: 'https://dropbox.com', icon: 'fab fa-dropbox' },
            { id: 34, name: 'Canva', url: 'https://canva.com', icon: 'fas fa-palette' },
            { id: 35, name: 'Notion', url: 'https://notion.so', icon: 'fas fa-layer-group' },
            { id: 36, name: 'Steam', url: 'https://store.steampowered.com', icon: 'fab fa-steam' }
        ];

        const app = {
            data: {
                engine: localStorage.getItem('nexus_engine') || 'google',
                bookmarks: JSON.parse(localStorage.getItem('nexus_bookmarks')) || CORE_SITES
            },
            state: { ctxId: null, editId: null },

            init() {
                this.renderGrid();
                this.startClock();
                this.initVisuals();
                this.bindEvents();
                this.updateEngineUI();
            },

            updateEngineUI() {
                const icons = { google: 'fab fa-google', bing: 'fab fa-microsoft', yahoo: 'fab fa-yahoo' };
                document.getElementById('currEngBtn').innerHTML = `<i class="${icons[this.data.engine]}"></i>`;
            },

            setEngine(eng) {
                this.data.engine = eng;
                localStorage.setItem('nexus_engine', eng);
                this.updateEngineUI();
            },

            startClock() {
                const tick = () => {
                    const now = new Date();
                    const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
                    const t = new Date(utc + (3600000 * ENV.utcOffset));
                    document.getElementById('clock').textContent = t.toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit' });
                    document.getElementById('date').textContent = t.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
                    requestAnimationFrame(tick);
                };
                tick();
            },

            renderGrid() {
                const grid = document.getElementById('grid');
                grid.innerHTML = '';
                
                this.data.bookmarks.forEach((item, i) => {
                    const el = document.createElement('div');
                    el.className = 'card';
                    el.style.animationDelay = `${i * 30}ms`;
                    el.style.animation = 'popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) backwards';
                    el.style.animationDelay = `${i * 20}ms`;
                    
                    const iconHTML = item.icon.startsWith('http') 
                        ? `<img src="${item.icon}" class="icon-img">` 
                        : `<i class="${item.icon} icon-wrap"></i>`;

                    el.innerHTML = `${iconHTML}<div class="card-label">${item.name}</div>`;
                    
                    el.onclick = () => window.open(item.url, '_blank');
                    el.oncontextmenu = (e) => { e.preventDefault(); this.openCtx(e, item.id); };
                    
                    grid.appendChild(el);
                });

                const addBtn = document.createElement('div');
                addBtn.className = 'card';
                addBtn.style.border = '2px dashed rgba(255,255,255,0.4)';
                addBtn.style.background = 'transparent';
                addBtn.innerHTML = `<i class="fas fa-plus icon-wrap"></i>`;
                addBtn.onclick = () => this.openEditModal();
                grid.appendChild(addBtn);
            },

            search() {
                const val = document.getElementById('searchInp').value.trim();
                if(val) window.location.href = ENV.engines[this.data.engine] + encodeURIComponent(val);
            },

            openCtx(e, id) {
                this.state.ctxId = id;
                const m = document.getElementById('ctxMenu');
                m.style.display = 'flex';
                m.style.top = `${e.clientY}px`;
                m.style.left = `${e.clientX}px`;
            },

            toggleModal(id, show) {
                const el = document.getElementById(id);
                show ? el.classList.add('active') : el.classList.remove('active');
            },

            openEditModal(isEdit = false) {
                this.toggleModal('editModal', true);
                this.state.editId = isEdit ? this.state.ctxId : null;
                if(isEdit) {
                    const item = this.data.bookmarks.find(x => x.id === this.state.ctxId);
                    document.getElementById('eName').value = item.name;
                    document.getElementById('eUrl').value = item.url;
                    document.getElementById('eIcon').value = item.icon;
                } else {
                    document.getElementById('eName').value = '';
                    document.getElementById('eUrl').value = '';
                    document.getElementById('eIcon').value = '';
                }
            },

            saveShortcut() {
                const name = document.getElementById('eName').value;
                let url = document.getElementById('eUrl').value;
                const icon = document.getElementById('eIcon').value || 'fas fa-link';
                if(!name || !url) return;
                if(!url.startsWith('http')) url = 'https://' + url;

                if(this.state.editId) {
                    const idx = this.data.bookmarks.findIndex(x => x.id === this.state.editId);
                    this.data.bookmarks[idx] = { id: this.state.editId, name, url, icon };
                } else {
                    this.data.bookmarks.push({ id: Date.now(), name, url, icon });
                }
                this.persist();
                this.renderGrid();
                this.toggleModal('editModal', false);
            },

            deleteShortcut() {
                if(confirm('Delete this shortcut?')) {
                    this.data.bookmarks = this.data.bookmarks.filter(x => x.id !== this.state.ctxId);
                    this.persist();
                    this.renderGrid();
                }
            },

            persist() {
                localStorage.setItem('nexus_bookmarks', JSON.stringify(this.data.bookmarks));
            },

            exportData() {
                const blob = new Blob([JSON.stringify(this.data.bookmarks)], {type:'application/json'});
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = `nexus_data_${Date.now()}.json`;
                a.click();
            },

            importData() {
                const i = document.createElement('input');
                i.type = 'file';
                i.onchange = e => {
                    const r = new FileReader();
                    r.onload = ev => {
                        try {
                            this.data.bookmarks = JSON.parse(ev.target.result);
                            this.persist();
                            this.renderGrid();
                            this.toggleModal('dataModal', false);
                        } catch(err) { alert('Invalid file'); }
                    };
                    r.readAsText(e.target.files[0]);
                };
                i.click();
            },

            bindEvents() {
                document.getElementById('searchBtn').onclick = () => this.search();
                document.getElementById('searchInp').onkeypress = e => e.key === 'Enter' && this.search();
                document.getElementById('searchInp').onfocus = () => document.body.classList.add('focus');
                document.getElementById('searchInp').onblur = () => setTimeout(() => document.body.classList.remove('focus'), 200);
                
                document.getElementById('setBtn').onclick = () => this.toggleModal('dataModal', true);
                
                document.onclick = e => {
                    if(!e.target.closest('.context-menu')) document.getElementById('ctxMenu').style.display = 'none';
                };

                document.getElementById('ctxEdit').onclick = () => this.openEditModal(true);
                document.getElementById('ctxDel').onclick = () => this.deleteShortcut();
            },

            initVisuals() {
                const cvs = document.getElementById('canvas-overlay');
                const ctx = cvs.getContext('2d');
                let w, h;
                let stars = [];
                const mouse = { x: -100, y: -100 };

                const resize = () => { w = cvs.width = window.innerWidth; h = cvs.height = window.innerHeight; };
                window.onresize = resize;
                window.onmousemove = e => { mouse.x = e.clientX; mouse.y = e.clientY; };
                resize();

                class Star {
                    constructor() {
                        this.x = Math.random() * w;
                        this.y = Math.random() * h;
                        this.vx = (Math.random() - 0.5) * 0.3;
                        this.vy = (Math.random() - 0.5) * 0.3;
                        this.size = Math.random() * 2;
                        this.o = Math.random();
                    }
                    update() {
                        this.x += this.vx; this.y += this.vy;
                        if(this.x < 0 || this.x > w) this.vx *= -1;
                        if(this.y < 0 || this.y > h) this.vy *= -1;
                    }
                    draw() {
                        ctx.fillStyle = `rgba(255,255,255,${this.o})`;
                        ctx.beginPath();
                        ctx.arc(this.x, this.y, this.size, 0, Math.PI*2);
                        ctx.fill();
                    }
                }

                for(let i=0; i<70; i++) stars.push(new Star());

                const anim = () => {
                    ctx.clearRect(0,0,w,h);
                    stars.forEach(s => {
                        s.update();
                        s.draw();
                        const dx = mouse.x - s.x;
                        const dy = mouse.y - s.y;
                        const d = Math.sqrt(dx*dx + dy*dy);
                        if(d < 150) {
                            ctx.strokeStyle = `rgba(255,255,255,${1 - d/150})`;
                            ctx.lineWidth = 0.5;
                            ctx.beginPath();
                            ctx.moveTo(s.x, s.y);
                            ctx.lineTo(mouse.x, mouse.y);
                            ctx.stroke();
                        }
                    });
                    requestAnimationFrame(anim);
                };
                anim();
            }
        };

        window.onload = () => app.init();
        window.onpageshow = () => {
            document.body.classList.remove('focus');
            if(document.activeElement) document.activeElement.blur();
        };
    </script>
</body>
</html>
